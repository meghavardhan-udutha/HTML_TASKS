<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Layout</title>

<style>
    body {
        background: #f5f5f5;
        margin: 0;
        padding: 20px;
    }

    .card-container {
        display: flex;
        justify-content: space-around;
    }

    .card {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        text-align: center;
        padding-bottom: 15px;
    }

    .card img {
        width: 100%;
        height: 150px;
        object-fit: cover;
    }

    .card h3 {
        margin: 10px 0 5px;
    }

    .card p {
        font-size: 14px;
        padding: 0 10px;
        color: #555;
    }

    .card button {
        margin-top: 10px;
        padding: 8px 15px;
        border: none;
        background: #007BFF;
        color: white;
        border-radius: 6px;
        cursor: pointer;
    }

    .card:nth-child(3) {
        border: 3px solid gray;
        transform: scale(1.05);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.355);
    }

    .card:nth-child(3) button {
        background: #ff9800;
    }

</style>
</head>

<body>

<div class="card-container">

    <div class="card">
        <img src="https://picsum.photos/300/200?1">
        <h3>Card 1</h3>
        <p>This is description for card one.</p>
        <button>Read More</button>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/200?2">
        <h3>Card 2</h3>
        <p>This is description for card two.</p>
        <button>Read More</button>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/200?3">
        <h3>Highlighted Card</h3>
        <p>This card is highlighted as the featured one.</p>
        <button>Explore</button>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/200?4">
        <h3>Card 4</h3>
        <p>This is description for card four.</p>
        <button>Read More</button>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/200?5">
        <h3>Card 5</h3>
        <p>This is description for card five.</p>
        <button>Read More</button>
    </div>

</div>

</body>
</html>
