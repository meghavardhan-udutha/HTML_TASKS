<!DOCTYPE html>
<html>
<head>
<style>

body {
    font-family: Arial;
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 40px;
}

/* CARD */
.card {
    width: 250px;
    height: 300px;
    background-color: white;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    transition: all 0.4s ease;

    /* background properties */
    background-size: cover;
    background-position: center;
}

/* HOVER EFFECT */
.card:hover {
    color: white;

    background-image: url("https://picsum.photos/300/400?random=1");
}

/* Different backgrounds for each card */
.card:nth-child(2):hover {
    background-image: url("https://picsum.photos/300/400?random=2");
}

.card:nth-child(3):hover {
    background-image: url("https://picsum.photos/300/400?random=3");
}


/* TEXT */
h3 {
    margin-bottom: 10px;
}

button {
    margin-top: 20px;
    padding: 10px 15px;
    border: none;
    background: black;
    color: white;
    cursor: pointer;
}

</style>
</head>

<body>

<div class="card">
    <h3>Card 1</h3>
    <p>Hover to see background</p>
    <button>Click</button>
</div>

<div class="card">
    <h3>Card 2</h3>
    <p>Hover to see background</p>
    <button>Click</button>
</div>

<div class="card">
    <h3>Card 3</h3>
    <p>Hover to see background</p>
    <button>Click</button>
</div>

</body>
</html>
