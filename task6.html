<!DOCTYPE html>
<html>
<head>
<style>

* {
    box-sizing: border-box;
}

/* BODY */
body {
    margin: 0;
    font-family: Arial;
    background: #f4f4f4;
}

/* HEADER */
.header {
    background: #333;
    color: white;
    text-align: center;
    padding: 20px;   /* inside space */
    margin-bottom: 20px; /* outside space */
}

/* CONTAINER */
.container {
    width: 90%;
    margin: auto; /* center */
}

/* CARD */
.card {
    background: white;
    padding: 15px;   /* space inside */
    margin: 15px 0;  /* space between cards */
    border: 2px solid #ddd; /* border */
    border-radius: 10px;
}

/* BUTTON */
button {
    padding: 10px 15px;
    margin-top: 10px;
    border: none;
    background: blue;
    color: white;
}

/* FOOTER */
.footer {
    background: black;
    color: white;
    text-align: center;
    padding: 15px;
    margin-top: 20px;
}

</style>
</head>

<body>

<div class="header">
    <h1>My Template</h1>
</div>

<div class="container">

    <div class="card">
        <h3>Card 1</h3>
        <p>This is content inside the card.</p>
        <button>Click</button>
    </div>

    <div class="card">
        <h3>Card 2</h3>
        <p>This is another card using box model.</p>
        <button>Click</button>
    </div>

</div>

<div class="footer">
    <p>Footer Section</p>
</div>

</body>
</html>
